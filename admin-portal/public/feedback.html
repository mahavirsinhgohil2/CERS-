<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Feedback | College Event Registration System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="navbar">
    <div class="container navbar-inner">
      <div class="logo">
        <img src="images/silver-oak-logo.png" alt="Silver Oak University Logo" />
      </div>
      <a class="brand" href="dashboard.html">Admin Portal - Silver Oak University</a>
      <nav class="nav-links" aria-label="Admin navigation">
        <a href="dashboard.html">Dashboard</a>
        <a href="manage-events.html">Event Management</a>
        <a href="registrations.html">Registrations</a>
        <a class="active" href="feedback.html">Feedback</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <h2>Feedback Management</h2>
        <p>View average rating, submission count, and recent student comments event-wise.</p>

        <section class="card registration-controls">
          <div class="form-grid registration-filter-grid">
            <div class="field">
              <label for="feedbackEventFilter">Filter by Event</label>
              <select id="feedbackEventFilter">
                <option value="">All Events</option>
              </select>
            </div>
            <div class="field">
              <label for="minRatingFilter">Minimum Rating</label>
              <select id="minRatingFilter">
                <option value="">All Ratings</option>
                <option value="1">1 and above</option>
                <option value="2">2 and above</option>
                <option value="3">3 and above</option>
                <option value="4">4 and above</option>
                <option value="5">Only 5</option>
              </select>
            </div>
            <div class="field actions" style="align-items:end;">
              <button class="btn btn-secondary" type="button" id="clearFeedbackFilters">Clear Filters</button>
            </div>
          </div>
        </section>

        <section class="section" style="padding-bottom: 0;">
          <h3 class="mb-2">Event Summary</h3>
          <div id="feedbackSummaryContainer" class="grid cards"></div>
        </section>

        <section class="section" style="padding-bottom: 0;">
          <h3 class="mb-2">Recent Feedback Comments</h3>
          <div id="feedbackCommentsContainer" class="event-groups"></div>
        </section>

        <div id="feedbackMessage" class="message" style="display:none;"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-content">
        <p>&copy; 2026 Silver Oak University. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/js/api-base.js"></script>
  <script src="js/feedback.js"></script>
</body>
</html>
