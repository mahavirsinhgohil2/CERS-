  <circle cx="100" cy="100" r="95" fill="#F8F8F8" stroke="#8B1E2D" stroke-width="2"/>
  
  <!-- Shield shape for university emblem -->
  <path d="M 100 30 L 140 50 L 140 90 Q 140 130 100 150 Q 60 130 60 90 L 60 50 Z" 
        fill="#8B1E2D" stroke="#6E1724" stroke-width="1.5"/>
  
